<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';">
  <title>Command Center</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="titlebar">
    <div class="titlebar-left">
      <span class="app-icon">&#9889;</span>
      <h1>Command Center</h1>
    </div>
    <div class="titlebar-right">
      <span id="exec-status" class="badge badge-idle">Idle</span>
    </div>
  </header>
  <main class="cmd-layout">
    <section class="cmd-panel">
      <div class="panel-section">
        <label class="panel-label">Account</label>
        <select id="account-select" class="select-input">
          <option value="">-- Select Account --</option>
        </select>
      </div>
      <div class="panel-section">
        <label class="panel-label">Platform</label>
        <select id="platform-select" class="select-input">
          <option value="">-- Select Platform --</option>
        </select>
      </div>
      <div class="panel-section">
        <label class="panel-label">Action</label>
        <select id="action-select" class="select-input" disabled>
          <option value="">-- Select Action --</option>
        </select>
      </div>
      <div id="params-container" class="panel-section params-container"></div>
      <div class="panel-section panel-actions">
        <button id="btn-run" class="btn btn-success btn-block" disabled>&#9654; Run</button>
        <button id="btn-stop" class="btn btn-danger btn-block" disabled>&#9632; Stop</button>
      </div>
    </section>
    <section class="log-panel">
      <div class="log-header">
        <h2>Log Output</h2>
        <button id="btn-clear-log" class="btn btn-secondary btn-sm">Clear</button>
      </div>
      <div id="log-output" class="log-output">
        <div class="log-entry log-info">Command Center ready. Select an account, platform, and action to begin.</div>
      </div>
    </section>
  </main>
  <script src="js/renderer.js"></script>
</body>
</html>
